<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Games</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
<div class="container">
    <h2>Games</h2>
    <ul id="games-list"></ul>
</div>

<script>
async function loadGames(){
    const res = await fetch("/api/m/game-list");
    const data = await res.json();
    const ul = document.getElementById("games-list");
    data.games.forEach(g => {
        const li = document.createElement("li");
        li.innerText = g;
        ul.appendChild(li);
    });
}
loadGames();
</script>
</body>
</html>
